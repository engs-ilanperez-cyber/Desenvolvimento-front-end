<!DOCTYPE html>
<html lang="en">
<head>
     <style>
        body {
        background-color: rgb(51, 42, 51);
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro</title>
</head>
<body>

   

    <iframe width="560" height="315" src="https://www.youtube.com/embed/7wMz8mDyHgM?si=H0I3oIPYmn18IhCR" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    </iframe>
    <br><br>
    <h1>cadastro de VOCE</h1>
    <form id="formCadastro">
        <label for="nome">nome:</label>
        <input type="text" name="nome" id="nome"
        placeholder="insira o nome" required>
        <br><br>
        <label for="email">email:</label>
        <input type="email" name="email" id="email"
        placeholder="insira seu email" required>
        <br><br>
        <label for="idade">insira sua idade:</label>
        <input type="number" name="idade" id="idade">
        <br><br>
        <button type="submit">enviar</button>
    </form>

    <script>
        const formulario = document.getElementById("formCadastro")
        formulario.addEventListener("submit", function(event){
            event.preventDefault();

            const dados = {
                nome: document.getElementById("nome").value,
                email: document.getElementById("email").value,
                idade: document.getElementById("idade").value
            };

            console.log(dados);

        })
    </script>

</body>
</html>
